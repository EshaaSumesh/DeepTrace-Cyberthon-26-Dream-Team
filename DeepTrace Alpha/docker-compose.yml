version: "3.9"

services:
  deeptrace:
    build:
      context: .
      dockerfile: Dockerfile
    image: deeptrace:latest
    container_name: deeptrace
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      # Mount frontend for live editing without rebuild
      - ./frontend:/app/frontend:ro
    # Resource limits — important on shared hackathon hardware
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "2G"
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

